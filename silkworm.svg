<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 蚕宝宝身体 -->
  <ellipse cx="100" cy="75" rx="70" ry="35" fill="#fafafa" stroke="#e0e0e0" stroke-width="2"/>
  <ellipse cx="45" cy="75" rx="35" ry="30" fill="#fafafa" stroke="#e0e0e0" stroke-width="2"/>
  <!-- 身体纹理 -->
  <line x1="70" y1="55" x2="70" y2="95" stroke="#e8e8e8" stroke-width="3"/>
  <line x1="90" y1="50" x2="90" y2="100" stroke="#e8e8e8" stroke-width="3"/>
  <line x1="110" y1="50" x2="110" y2="100" stroke="#e8e8e8" stroke-width="3"/>
  <line x1="130" y1="55" x2="130" y2="95" stroke="#e8e8e8" stroke-width="3"/>
  <!-- 眼睛 -->
  <circle cx="30" cy="65" r="6" fill="#333"/>
  <circle cx="28" cy="63" r="2" fill="#fff"/>
  <!-- 嘴巴微笑 -->
  <path d="M 25 80 Q 30 88 35 80" stroke="#333" stroke-width="2" fill="none"/>
  <!-- 触角 -->
  <path d="M 15 55 Q 10 40 20 35" stroke="#98fb98" stroke-width="3" fill="none"/>
  <circle cx="20" cy="35" r="4" fill="#98fb98"/>
  <!-- 脚 -->
  <ellipse cx="60" cy="105" rx="10" ry="4" fill="#ddd"/>
  <ellipse cx="100" cy="105" rx="10" ry="4" fill="#ddd"/>
  <ellipse cx="140" cy="105" rx="10" ry="4" fill="#ddd"/>
</svg>
